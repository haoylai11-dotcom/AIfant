<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>DYKS Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 400px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; }
    .header { background: linear-gradient(135deg, #1a56db 0%, #3b82f6 100%); color: #fff; padding: 12px 16px; }
    .header h1 { font-size: 15px; margin-bottom: 2px; }
    .header p { font-size: 11px; opacity: 0.85; }
    .section { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
    .section:last-child { border-bottom: none; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
    .row label { font-size: 12px; color: #666; }
    .row .val { font-size: 12px; color: #333; font-weight: 500; }
    .val.null { color: #ccc; font-style: italic; font-weight: 400; }
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .metric { background: #f9fafb; border-radius: 6px; padding: 8px; text-align: center; }
    .metric .num { font-size: 18px; font-weight: 700; color: #1a56db; }
    .metric .num.na { font-size: 13px; color: #ccc; font-weight: 400; }
    .metric .label { font-size: 10px; color: #888; margin-top: 2px; }
    .actions { padding: 12px 16px; display: flex; gap: 8px; }
    .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #1a56db; color: #fff; }
    .btn-primary:hover { background: #1e40af; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .server-url { display: flex; gap: 4px; align-items: center; padding: 6px 0; }
    .server-url input { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 4px 8px; font-size: 12px; }
    .toast { padding: 8px 12px; border-radius: 6px; font-size: 12px; margin: 8px 16px; }
    .toast.success { background: #ecfdf5; color: #065f46; }
    .toast.error { background: #fef2f2; color: #991b1b; }
    .toast.info { background: #eff6ff; color: #1e40af; }
    .status-bar { padding: 6px 16px; background: #f0fdf4; font-size: 11px; color: #166534; display: flex; align-items: center; gap: 4px; }
    .status-bar.error { background: #fef2f2; color: #991b1b; }
    .extract-badge { display: inline-block; background: #10b981; color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }
    .editable-val { border: 1px solid transparent; border-radius: 3px; padding: 1px 4px; font-size: 12px; font-weight: 500; cursor: text; }
    .editable-val:hover { border-color: #ddd; }
    .editable-val:focus { border-color: #3b82f6; outline: none; }
    .fold { cursor: pointer; color: #888; font-size: 11px; }
    .fold:hover { color: #333; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 DYKS Analyzer</h1>
    <p>抖音 / 快手 · 视频数据提取器</p>
  </div>

  <div id="status"></div>

  <!-- 提取结果 -->
  <div id="result-panel" style="display:none;">
    <div class="section">
      <div class="row">
        <label>平台</label>
        <span class="val" id="result-platform"></span>
      </div>
      <div class="row">
        <label>标题</label>
        <span class="val editable-val" id="result-title" contenteditable="true">—</span>
      </div>
      <div class="row">
        <label>作者</label>
        <span class="val editable-val" id="result-author" contenteditable="true">—</span>
      </div>
    </div>

    <div class="section">
      <div class="metrics" id="result-metrics">
        <div class="metric">
          <div class="num na" id="metric-likes">—</div>
          <div class="label">👍 点赞</div>
        </div>
        <div class="metric">
          <div class="num na" id="metric-comments">—</div>
          <div class="label">💬 评论</div>
        </div>
        <div class="metric">
          <div class="num na" id="metric-shares">—</div>
          <div class="label">↗ 分享</div>
        </div>
        <div class="metric">
          <div class="num na" id="metric-views">—</div>
          <div class="label">▶ 播放</div>
        </div>
      </div>
    </div>

    <div class="section hidden" id="advanced-section">
      <div class="row"><label>收藏</label><span class="val" id="result-favorites">—</span></div>
      <div class="row"><label>作者粉丝</label><span class="val" id="result-followers">—</span></div>
      <div class="row"><label>发布时间</label><span class="val" id="result-time">—</span></div>
      <div class="row"><label>链接</label><span class="val" style="font-size:10px;word-break:break-all;" id="result-url">—</span></div>
    </div>
    <div style="padding:2px 16px;">
      <span class="fold" onclick="toggleAdvanced()">展开更多字段 ▾</span>
    </div>

    <div class="section">
      <div class="server-url">
        <label style="font-size:11px;color:#888;white-space:nowrap;">发送到</label>
        <input type="text" id="server-url" value="http://localhost:8000" placeholder="http://localhost:8000">
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" id="btn-retry">🔄 重新提取</button>
      <button class="btn btn-primary" id="btn-send">📤 发送到工具</button>
    </div>
  </div>

  <!-- 未打开视频页面的提示 -->
  <div id="no-data-panel" style="display:none;">
    <div class="section">
      <p style="font-size:13px;color:#666;text-align:center;padding:20px 0;">
        ℹ️ 请在抖音或快手视频页面打开此扩展
      </p>
    </div>
  </div>

  <!-- 加载中 -->
  <div id="loading-panel">
    <div class="section">
      <p style="font-size:13px;color:#999;text-align:center;padding:20px 0;">
        🔍 正在提取数据...
      </p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
